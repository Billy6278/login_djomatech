<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="utf-8">
  <title>login_djomatech</title>
  <meta http-equiv="pragma" content="no-cache" />
  <meta http-equiv="expires" content="-1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <link rel="icon" type="image/png" href="Logodjomatech.png">
  <link rel="shortcut icon" type="image/png" href="Logodjomatech.png">
  <link rel="stylesheet" href="login.css" media="screen">


</head>

<body class='login'>
  <div class="login-container">
    <form class="vertical-form" name="login" action="$(link-login-only)" method="post">
      <input type="hidden" name="dst" value="$(link-orig)" />
      <input type="hidden" name="popup" value="true" />
      <div class="form-header">
        <img class="logo" src="Logodjomatech.png" alt="Djoma Tech Logo" />
        <h1>Bienvenue chez Djoma Tech</h1>
        <p class="subtitle">Connectez-vous à votre espace sécurisé</p>
      </div>
      <div class="form-group">
        <input name="username" type="text" value="" placeholder="Utilisateur" required />
      </div>
      <div class="form-group password-group">
        <input autocomplete="off" name="password" id="password" type="password" placeholder="Mot de passe" required />
        <button type="button" id="togglePassword" class="toggle-password"
          aria-label="Afficher ou masquer le mot de passe" title="Afficher/Masquer le mot de passe">
          <svg class="eye-icon eye-show" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
          <svg class="eye-icon eye-hide hidden" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <path
              d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24">
            </path>
            <line x1="1" y1="1" x2="23" y2="23"></line>
          </svg>
        </button>
      </div>
      <button name="submit" type="submit" class="btn-submit">Se connecter</button>
      <div class='footer'>
        <p>Contactez-nous sur <a href="https://djomatech.vercel.app" class="trial-link" target="_blank"
            rel="noopener">djomatech.vercel.app</a></p>
      </div>
    </form>
  </div>

  <script type="text/javascript">
    <!-
      document.login.username.focus();
    //-->
  </script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var toggleBtn = document.getElementById('togglePassword');
      var passwordInput = document.getElementById('password');
      if (toggleBtn && passwordInput) {
        var eyeShow = toggleBtn.querySelector('.eye-show');
        var eyeHide = toggleBtn.querySelector('.eye-hide');
        toggleBtn.addEventListener('click', function () {
          var isPassword = passwordInput.getAttribute('type') === 'password';
          passwordInput.setAttribute('type', isPassword ? 'text' : 'password');
          if (isPassword) {
            eyeShow.classList.add('hidden');
            eyeHide.classList.remove('hidden');
          } else {
            eyeShow.classList.remove('hidden');
            eyeHide.classList.add('hidden');
          }
        });
      }
    });
  </script>
</body>

</html>
